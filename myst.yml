version: 1
project:
  title: Alberto Scotti - Sport Performance Analyst
  # authors:
  #   - name: Author Name
  copyright: '2026'
  exclude:
    - _build
    - Thumbs.db
    - .DS_Store
    - '**.ipynb_checkpoints'
  github: albertoscotti/albertoscotti.github.io
  thebe:
    binder:
      repo: albertoscotti/albertoscotti.github.io
      provider: github
      url: https://mybinder.org
      ref: main
  bibliography:
    - web/references.bib
  toc:
    - file: index.md
    - title: About Me
      children:
        - file: web/aboutme/philosophy.md
        - file: web/aboutme/keyskills.md
        - file: web/aboutme/sportexperience.md
    - title: Getting Started
      children:
        - file: book/part01/getting-started.md
        - file: book/part01/installation.md
    - title: Examples
      children:
        - file: book/part02/first-example.md
site:
  url: https://albertoscotti.github.io
  options:
    logo: AS_SA_logo.png
    logo_dark: AS_SA_logo_dark.png
    favicon: AS_SA_icon.ico
    folders: true
    style: custom.css
    # analytics_google: G-XXX
  template: book-theme
  parts:
    primary_sidebar_footer: ''
html:
  use_repository_button: false
  use_edit_page_button: false
  use_issues_button: false
launch:
  enabled: false

